{% extends "base.html" %}

{% block title %}Upload - KhojAI{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h2 class="h4 mb-0"><i class="fas fa-upload me-2"></i>Report a Missing or Found Person</h2>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data" action="{{ url_for('upload') }}" id="uploadForm">
                    <div class="mb-4 text-center">
                        <div class="mb-3">
                            <div class="image-upload-container" style="max-width: 300px; margin: 0 auto;">
                                <div class="image-preview mb-2" style="width: 200px; height: 200px; border: 2px dashed #ddd; border-radius: 50%; margin: 0 auto; overflow: hidden; position: relative; background-color: #f8f9fa;">
                                    <img id="imagePreview" src="{{ url_for('static', filename='img/placeholder.jpg') }}" alt="Preview" class="img-fluid" style="width: 100%; height: 100%; object-fit: cover;">
                                    <div class="overlay" style="position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.5); color: white; padding: 5px; text-align: center; font-size: 12px;">Click to upload</div>
                                </div>
                                <input type="file" class="form-control d-none" id="photo" name="photo" accept="image/*" required>
                                <small class="form-text text-muted">Upload a clear face photo (Max 5MB, JPG/PNG)</small>
                            </div>
                        </div>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="name" class="form-label">Full Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="name" name="name" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Type <span class="text-danger">*</span></label>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="type" id="typeMissing" value="missing" checked>
                                    <label class="form-check-label" for="typeMissing">
                                        <i class="fas fa-user-times text-danger me-1"></i> Missing Person
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="type" id="typeFound" value="found">
                                    <label class="form-check-label" for="typeFound">
                                        <i class="fas fa-user-check text-success me-1"></i> Found Person
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="gender" class="form-label">Gender <span class="text-danger">*</span></label>
                                <select class="form-select" id="gender" name="gender" required>
                                    <option value="" selected disabled>Select gender</option>
                                    <option value="male">Male</option>
                                    <option value="female">Female</option>
                                    <option value="other">Other</option>
                                    <option value="unknown">Prefer not to say</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="age" class="form-label">Age <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="age" name="age" min="0" max="120" required>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="lastSeenDate" class="form-label">Last Seen Date</label>
                                <input type="date" class="form-control" id="lastSeenDate" name="last_seen_date">
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="location" class="form-label">Last Known Location <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="location" name="location" placeholder="City, State, Country" required>
                    </div>

                    <div class="mb-3">
                        <label for="contact" class="form-label">Contact Information <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="contact" name="contact" placeholder="Your phone number or email" required>
                        <small class="form-text text-muted">This will be displayed publicly to help people contact you.</small>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Additional Information</label>
                        <textarea class="form-control" id="description" name="description" rows="3" placeholder="Any additional details that might help in identification (e.g., clothing, distinguishing marks, etc.)"></textarea>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <button type="reset" class="btn btn-outline-secondary me-md-2">Reset Form</button>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-paper-plane me-1"></i> Submit Report
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const imagePreview = document.getElementById('imagePreview');
    const fileInput = document.getElementById('photo');
    const uploadContainer = document.querySelector('.image-upload-container');
    
    // Click on the image to trigger file input
    uploadContainer.addEventListener('click', function() {
        fileInput.click();
    });

    // Handle file selection
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            if (file.size > 5 * 1024 * 1024) { // 5MB limit
                alert('File size exceeds 5MB limit. Please choose a smaller file.');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(event) {
                imagePreview.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }
    });

    // Form validation
    const form = document.getElementById('uploadForm');
    form.addEventListener('submit', function(e) {
        if (!fileInput.files.length) {
            e.preventDefault();
            alert('Please upload a photo');
            return false;
        }
        return true;
    });
});
</script>
{% endblock %}
